services:
  - type: web
    name: retail-ai-agent
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install torch==2.3.0+cpu
      --index-url https://download.pytorch.org/whl/cpu
      && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
